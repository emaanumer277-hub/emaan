<title>Almadina Steel Works</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:#fff;
}

/* ===== TOP NAVBAR ===== */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#1c1c1c;
    padding:15px 25px;
}

/* LOGOS */
.logo{
    width:60px;
    height:60px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid grey;
}

/* CENTER NAME */
.nav-title{
    font-size:22px;
    font-weight:bold;
    text-align:center;
}

/* ===== NAVDIV BUTTONS ===== */
.navdiv{
    display:flex;
    justify-content:center;
    gap:15px;
    background:#333;
    padding:12px;
}

.navdiv a{
    text-decoration:none;
    color:white;
    padding:10px 18px;
    border-radius:6px;
    transition:0.3s;
}

/* ORANGE HOVER */
.navdiv a:hover{
    background:orange;
    color:black;
    box-shadow:0 0 10px orange;
    transform:translateY(-3px);
}

/* ===== GRID ===== */
.container{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:25px;
    padding:30px;
}

/* CARD */
.card{
    background:#1f1f1f;
    border-radius:12px;
    overflow:hidden;
    transition:0.4s;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 0 20px rgba(255,140,0,0.4);
}

/* IMAGE */
.card img{
    width:100%;
    height:280px;
    object-fit:cover;
}

/* TEXT */
.card h3{
    text-align:center;
    padding:10px;
    color:#ddd;
}

/* ===== MAP ===== */
.map{
    width:100%;
    height:350px;
    border:none;
    margin-top:20px;
}

/* FOOTER */
.footer{
    background:#1c1c1c;
    text-align:center;
    padding:25px;
    margin-top:20px;
    color:#aaa;
}
</style>

</head>
<body>
